<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
</head>
<body>
    <h1>FORM</h1>
    <form action="" method="post">
        <b>
        <label for="nameId">Name:</label>
        <input type="text" id="nameId"><br><br>

        <label for="ageId">Age:</label>
        <input type="number" id="ageId"><br><br>

        <label for="dateofbirthId">Date Of Birth:</label>
        <input type="date" id="dateofbirthId" value="date"><br><br>

        <label for="phonenoId">Phone No:</label>
        <input type="tel" id="phonenoId"><br><br>

        <label for="emailId">Email:</label>
        <input type="email" id="emailId"><br><br>

        <label for="passwordId">Password:</label>
        <input type="password" id="passwordId"><br><br>

        <label for="genterId">Genter:</label><br>
        
        <input type="radio" id="femaleId" name="Genter" value="female">
        <label for="femaleId">female</label>

        <input type="radio" id="maleId" name="Genter" value="male">
        <label for="maleId">male</label>

        <input type="radio" id="otherId" name="Genter" value="other">
        <label for="otherId">Other</label><br><br>

        <label for="countryId">Country:</label>

        <select name="Country" id="countryId">
            <option value="select">Select</option>
            <option value="India">India</option>
            <option value="China">China</option> 
            <option value="Indonesia">Indinesia</option>
            <option value="Pakistan">Pakistan</option>
            <option value="Bangladesh">Bangladesh</option>
            <option value="Japan">Japan</option>
            <option value="Philippines">Philippines</option>
            <option value="Vietnam">Vietnam</option>
            <option value="Iran">Iran</option>
            <option value="Turkey">Turkey</option>
        </select><br><br>

        <label for="hobbyId">Hobby</label><br>

        <input type="checkbox" id="readingId">
        <label for="readingId">Reading</label><br>
        
        <input type="checkbox" id="writingId">
        <label for="writingId">Writing</label><br>
        
        <input type="checkbox" id="PaintingId">
        <label for="paintingId">Painting</label><br>
        
        <input type="checkbox" id="drawingId">
        <label for="drawingId">Drawing</label><br>
        
        <input type="checkbox" id="singingId">
        <label for="singingId">Singing</label><br>

         <input type="checkbox" id="listeningtomusicId">
        <label for="listeningtomusicId">Listening to music</label><br><br>
       
        <label for="fileId">Choose file</label>
        <input type="file" id="fileId"><br><br>

        <button>sumbit</button>
    </b>
    </form>

</body>
</html>
